version: 2

builds:
  - binary: muxwatch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

project_name: muxwatch

release:
  github:
    owner: matteobortolazzo
    name: claude-tools
