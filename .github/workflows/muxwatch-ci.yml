name: muxwatch — CI

on:
  push:
    branches: [main]
    paths: ['muxwatch/**']
  pull_request:
    branches: [main]
    paths: ['muxwatch/**']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: muxwatch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - run: go test ./...
      - run: go build ./...

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: muxwatch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          working-directory: muxwatch
