name: muxwatch — Release

on:
  push:
    tags:
      - 'muxwatch/v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: muxwatch
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
          workdir: muxwatch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
